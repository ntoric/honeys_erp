                    product_name: { type: string }
                    qty_sold: { type: number }
                    revenue: { type: number }
                    cogs: { type: number }
                    gross_profit: { type: number }
                    gross_margin_pct: { type: number }

  /reports/discount-analysis:
    get:
      tags: [Reports]
