    parameters:
      - name: ewb_no
        in: path
        required: true
        schema: { type: string }
    post:
      tags: [GST]
      summary: Extend e-Way Bill validity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
