openapi: 3.0.3
info:
  title: Retail POS Billing & Accounting API
  description: |
    Comprehensive REST API specification for a full-featured Retail POS Billing and Accounting 
    software system. Covers all modules including: POS transactions, inventory, GST/tax compliance,
    accounting, customer management, vendor management, purchase orders, reporting, user management,
    webhooks, and integrations (weighing machines, barcode, WhatsApp/SMS, payment gateways).
    
    Designed for Indian retail requirements including GST, e-Invoice (IRN), e-Way Bill, and UPI.
    Applicable to ERPNext / Frappe custom app implementations.

    ## Authentication
    All endpoints require a Bearer JWT token unless marked as public.
    Obtain a token via `POST /auth/login`.

  version: "1.0.0"
  contact:
    name: Hexonics POS API
    email: dev@hexonics.in
  license:
    name: MIT

servers:
  - url: https://api.yourpos.in/api/v1
    description: Production
  - url: https://staging.yourpos.in/api/v1
    description: Staging

tags:
  - name: Auth
    description: Authentication & session management
  - name: Users
    description: User & role management
  - name: Company
    description: Company / branch / outlet settings
  - name: Products
    description: Product / item master
  - name: Categories
    description: Product categories & sub-categories
  - name: Inventory
    description: Stock management, adjustments, transfers
  - name: Barcode
    description: Barcode generation & lookup
  - name: Customers
    description: Customer master & loyalty
  - name: Vendors
    description: Vendor / supplier master
  - name: POS
    description: Point-of-sale sessions & transactions
  - name: Sales
    description: Sales invoices, returns & credit notes
  - name: Purchase
    description: Purchase orders, receipts & returns
  - name: Payments
    description: Payments, receipts & payment modes
  - name: GST
    description: GST compliance — GSTR-1, GSTR-3B, e-Invoice, e-Way Bill
  - name: Accounting
    description: Chart of accounts, journal entries, ledgers
  - name: Expenses
    description: Expense tracking & petty cash
  - name: Reports
    description: Business reports & analytics
  - name: Notifications
    description: WhatsApp, SMS & email notifications
  - name: WeighingMachine
    description: YesWeigh / weighing scale integration
  - name: PaymentGateway
    description: UPI, card & online payment gateway
  - name: Webhooks
    description: Webhook subscriptions
  - name: Settings
    description: System & application settings

# ─────────────────────────────────────────────
# SECURITY
# ─────────────────────────────────────────────
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ── Common ──
    PaginationMeta:
      type: object
      properties:
        page: { type: integer, example: 1 }
        per_page: { type: integer, example: 20 }
        total: { type: integer, example: 200 }
        total_pages: { type: integer, example: 10 }

    Error:
      type: object
      properties:
        code: { type: string, example: VALIDATION_ERROR }
        message: { type: string }
        details: { type: object }

    # ── Auth ──
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string }
        outlet_id: { type: string, description: Required for multi-outlet login }

    LoginResponse:
      type: object
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        expires_in: { type: integer, example: 3600 }
        user: { $ref: '#/components/schemas/User' }

    # ── User ──
    User:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        email: { type: string }
        phone: { type: string }
        role: { type: string, enum: [admin, manager, cashier, accountant, viewer] }
        outlet_ids: { type: array, items: { type: string } }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }

    # ── Company / Outlet ──
    Company:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        legal_name: { type: string }
        gstin: { type: string, example: "22AAAAA0000A1Z5" }
        pan: { type: string }
        address: { $ref: '#/components/schemas/Address' }
        logo_url: { type: string }
        financial_year_start: { type: string, example: "04-01" }
        currency: { type: string, default: INR }
        timezone: { type: string, default: Asia/Kolkata }

    Outlet:
      type: object
      properties:
        id: { type: string }
        company_id: { type: string }
        name: { type: string }
        gstin: { type: string }
        address: { $ref: '#/components/schemas/Address' }
        is_active: { type: boolean }
        pos_config: { $ref: '#/components/schemas/POSConfig' }

    POSConfig:
      type: object
      properties:
        default_payment_mode: { type: string, enum: [cash, upi, card, credit] }
        print_receipt_on_save: { type: boolean }
        receipt_printer_type: { type: string, enum: [a4, thermal_2inch, thermal_3inch] }
        allow_discount: { type: boolean }
        max_discount_pct: { type: number }
        require_customer: { type: boolean }
        enable_loyalty: { type: boolean }
        enable_weighing_machine: { type: boolean }
        weighing_machine_port: { type: string }

    Address:
      type: object
      properties:
        line1: { type: string }
        line2: { type: string }
        city: { type: string }
        state: { type: string }
        state_code: { type: string, example: "29" }
        pincode: { type: string }
        country: { type: string, default: India }

    # ── Product ──
    Product:
      type: object
      properties:
        id: { type: string }
        sku: { type: string }
        name: { type: string }
        description: { type: string }
        category_id: { type: string }
        sub_category_id: { type: string }
        brand: { type: string }
        unit: { type: string, example: pcs }
        sale_price: { type: number }
        cost_price: { type: number }
        mrp: { type: number }
        tax_category: { type: string }
        gst_rate: { type: number, example: 18 }
        hsn_sac_code: { type: string }
        is_service: { type: boolean, default: false }
        track_inventory: { type: boolean, default: true }
        is_weighable: { type: boolean, default: false }
        barcode: { type: string }
        barcodes: { type: array, items: { type: string } }
        image_url: { type: string }
        is_active: { type: boolean }
        variants: { type: array, items: { $ref: '#/components/schemas/ProductVariant' } }
        batch_tracking: { type: boolean }
        serial_tracking: { type: boolean }
        reorder_level: { type: number }
        reorder_qty: { type: number }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ProductVariant:
      type: object
      properties:
        id: { type: string }
        product_id: { type: string }
        attributes: { type: object, description: "e.g. {size: L, color: Red}" }
        sku: { type: string }
        barcode: { type: string }
        sale_price: { type: number }
        cost_price: { type: number }
        stock_qty: { type: number }

    Category:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        parent_id: { type: string, nullable: true }
        image_url: { type: string }
        is_active: { type: boolean }

    # ── Inventory ──
    StockEntry:
      type: object
      properties:
        id: { type: string }
        entry_type:
          type: string
          enum: [purchase_receipt, sale, adjustment, transfer, opening, damage, return]
        product_id: { type: string }
        variant_id: { type: string, nullable: true }
        outlet_id: { type: string }
        batch_no: { type: string }
        serial_no: { type: string }
        qty: { type: number }
        unit_cost: { type: number }
        reference_doc: { type: string }
        notes: { type: string }
        created_by: { type: string }
        created_at: { type: string, format: date-time }

    StockBalance:
      type: object
      properties:
        product_id: { type: string }
        product_name: { type: string }
        outlet_id: { type: string }
        qty_on_hand: { type: number }
        qty_reserved: { type: number }
        qty_available: { type: number }
        valuation_rate: { type: number }
        total_value: { type: number }

    StockTransfer:
      type: object
      properties:
        id: { type: string }
        from_outlet_id: { type: string }
        to_outlet_id: { type: string }
        status: { type: string, enum: [draft, submitted, received, cancelled] }
        items:
          type: array
          items:
            type: object
            properties:
              product_id: { type: string }
              variant_id: { type: string }
              qty: { type: number }
              batch_no: { type: string }
        notes: { type: string }
        created_at: { type: string, format: date-time }

    # ── Customer ──
    Customer:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        phone: { type: string }
        email: { type: string }
        gstin: { type: string }
        pan: { type: string }
        address: { $ref: '#/components/schemas/Address' }
        credit_limit: { type: number }
        outstanding_balance: { type: number }
        loyalty_points: { type: number }
        customer_group: { type: string }
        price_list: { type: string }
        notes: { type: string }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }

    LoyaltyTransaction:
      type: object
      properties:
        id: { type: string }
        customer_id: { type: string }
        transaction_type: { type: string, enum: [earn, redeem, expire, adjust] }
        points: { type: number }
        reference_doc: { type: string }
        created_at: { type: string, format: date-time }

    # ── Vendor ──
    Vendor:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        phone: { type: string }
        email: { type: string }
        gstin: { type: string }
        pan: { type: string }
        address: { $ref: '#/components/schemas/Address' }
        payment_terms: { type: string }
        credit_limit: { type: number }
        outstanding_balance: { type: number }
        bank_details: { $ref: '#/components/schemas/BankDetails' }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }

    BankDetails:
      type: object
      properties:
        bank_name: { type: string }
        account_no: { type: string }
        ifsc_code: { type: string }
        account_name: { type: string }

    # ── POS Session ──
    POSSession:
      type: object
      properties:
        id: { type: string }
        outlet_id: { type: string }
        cashier_id: { type: string }
        status: { type: string, enum: [open, closed] }
        opening_cash: { type: number }
        closing_cash: { type: number }
        total_sales: { type: number }
        total_returns: { type: number }
        total_cash: { type: number }
        total_card: { type: number }
        total_upi: { type: number }
        total_credit: { type: number }
        opened_at: { type: string, format: date-time }
        closed_at: { type: string, format: date-time, nullable: true }
        closing_notes: { type: string }

    # ── Sales Invoice ──
    SalesInvoice:
      type: object
      properties:
        id: { type: string }
        invoice_no: { type: string }
        invoice_type: { type: string, enum: [pos, regular, credit_note, proforma, quotation, delivery_challan] }
        outlet_id: { type: string }
        pos_session_id: { type: string }
        customer_id: { type: string, nullable: true }
        customer_name: { type: string }
        customer_phone: { type: string }
        customer_gstin: { type: string }
        billing_address: { $ref: '#/components/schemas/Address' }
        shipping_address: { $ref: '#/components/schemas/Address' }
        invoice_date: { type: string, format: date }
        due_date: { type: string, format: date }
        items:
          type: array
          items: { $ref: '#/components/schemas/SalesLineItem' }
        discount_type: { type: string, enum: [percent, amount] }
        discount_value: { type: number }
        subtotal: { type: number }
        total_discount: { type: number }
        taxable_amount: { type: number }
        cgst_amount: { type: number }
        sgst_amount: { type: number }
        igst_amount: { type: number }
        cess_amount: { type: number }
        total_tax: { type: number }
        round_off: { type: number }
        grand_total: { type: number }
        paid_amount: { type: number }
        balance_due: { type: number }
        payment_mode: { type: string, enum: [cash, card, upi, credit, split] }
        payment_details: { type: array, items: { $ref: '#/components/schemas/PaymentSplit' } }
        status: { type: string, enum: [draft, submitted, paid, partially_paid, unpaid, cancelled] }
        irn: { type: string, description: e-Invoice IRN }
        irn_ack_no: { type: string }
        irn_ack_date: { type: string, format: date-time }
        eway_bill_no: { type: string }
        notes: { type: string }
        loyalty_points_earned: { type: number }
        loyalty_points_redeemed: { type: number }
        created_by: { type: string }
        created_at: { type: string, format: date-time }

    SalesLineItem:
      type: object
      required: [product_id, qty, sale_price]
      properties:
        id: { type: string }
        product_id: { type: string }
        variant_id: { type: string, nullable: true }
        product_name: { type: string }
        hsn_sac_code: { type: string }
        barcode: { type: string }
        qty: { type: number }
        unit: { type: string }
        sale_price: { type: number }
        mrp: { type: number }
        cost_price: { type: number }
        discount_pct: { type: number }
        discount_amount: { type: number }
        net_rate: { type: number }
        gst_rate: { type: number }
        gst_type: { type: string, enum: [inclusive, exclusive] }
        cgst_rate: { type: number }
        cgst_amount: { type: number }
        sgst_rate: { type: number }
        sgst_amount: { type: number }
        igst_rate: { type: number }
        igst_amount: { type: number }
        cess_rate: { type: number }
        cess_amount: { type: number }
        taxable_amount: { type: number }
        line_total: { type: number }
        batch_no: { type: string }
        serial_no: { type: string }
        weight_kg: { type: number, description: For weighable items }

    PaymentSplit:
      type: object
      properties:
        mode: { type: string, enum: [cash, card, upi, cheque, credit, gift_card, loyalty_points] }
        amount: { type: number }
        reference_no: { type: string }
        bank_name: { type: string }
        upi_id: { type: string }

    # ── Purchase Order ──
    PurchaseOrder:
      type: object
      properties:
        id: { type: string }
        po_no: { type: string }
        outlet_id: { type: string }
        vendor_id: { type: string }
        order_date: { type: string, format: date }
        expected_delivery: { type: string, format: date }
        status: { type: string, enum: [draft, submitted, partial, received, cancelled] }
        items:
          type: array
          items: { $ref: '#/components/schemas/PurchaseLineItem' }
        subtotal: { type: number }
        total_tax: { type: number }
        grand_total: { type: number }
        notes: { type: string }
        created_at: { type: string, format: date-time }

    PurchaseLineItem:
      type: object
      properties:
        id: { type: string }
        product_id: { type: string }
        variant_id: { type: string }
        product_name: { type: string }
        hsn_sac_code: { type: string }
        ordered_qty: { type: number }
        received_qty: { type: number }
        unit: { type: string }
        cost_price: { type: number }
        gst_rate: { type: number }
        cgst_amount: { type: number }
        sgst_amount: { type: number }
        igst_amount: { type: number }
        line_total: { type: number }

    PurchaseReceipt:
      type: object
      properties:
        id: { type: string }
        grn_no: { type: string }
        po_id: { type: string, nullable: true }
        outlet_id: { type: string }
        vendor_id: { type: string }
        receipt_date: { type: string, format: date }
        status: { type: string, enum: [draft, submitted, cancelled] }
        items:
          type: array
          items:
            allOf:
              - $ref: '#/components/schemas/PurchaseLineItem'
              - type: object
                properties:
                  batch_no: { type: string }
                  mfg_date: { type: string, format: date }
                  exp_date: { type: string, format: date }
        bill_no: { type: string }
        bill_date: { type: string, format: date }
        grand_total: { type: number }
        created_at: { type: string, format: date-time }

    # ── Payment ──
    PaymentEntry:
      type: object
      properties:
        id: { type: string }
        payment_no: { type: string }
        payment_type: { type: string, enum: [receive, pay, internal_transfer] }
        party_type: { type: string, enum: [customer, vendor] }
        party_id: { type: string }
        payment_date: { type: string, format: date }
        mode: { type: string, enum: [cash, bank, upi, cheque, card] }
        amount: { type: number }
        reference_no: { type: string }
        reference_date: { type: string, format: date }
        account_id: { type: string }
        allocations:
          type: array
          items:
            type: object
            properties:
              invoice_id: { type: string }
              allocated_amount: { type: number }
        notes: { type: string }
        created_at: { type: string, format: date-time }

    # ── GST ──
    GSTRSummary:
      type: object
      properties:
        period: { type: string, example: "2024-03" }
        outward_taxable: { type: number }
        outward_exempt: { type: number }
        inward_taxable: { type: number }
        total_cgst: { type: number }
        total_sgst: { type: number }
        total_igst: { type: number }
        total_cess: { type: number }
        net_tax_liability: { type: number }
        itc_eligible: { type: number }
        tax_payable: { type: number }

    EInvoiceRequest:
      type: object
      required: [invoice_id]
      properties:
        invoice_id: { type: string }
        cancel_reason: { type: string, description: Required for cancellation }

    EInvoiceResponse:
      type: object
      properties:
        invoice_id: { type: string }
        irn: { type: string }
        ack_no: { type: string }
        ack_date: { type: string, format: date-time }
        signed_invoice: { type: string }
        signed_qr_code: { type: string }
        status: { type: string, enum: [generated, cancelled] }

    EWayBillRequest:
      type: object
      required: [invoice_id]
      properties:
        invoice_id: { type: string }
        transporter_id: { type: string }
        transport_doc_no: { type: string }
        transport_doc_date: { type: string, format: date }
        vehicle_no: { type: string }
        vehicle_type: { type: string, enum: [R, O] }
        distance_km: { type: integer }
        supply_type: { type: string }
        sub_supply_type: { type: string }

    EWayBillResponse:
      type: object
      properties:
        invoice_id: { type: string }
        ewb_no: { type: string }
        ewb_date: { type: string, format: date-time }
        valid_upto: { type: string, format: date-time }
        status: { type: string }

    # ── Accounting ──
    Account:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        code: { type: string }
        account_type:
          type: string
          enum: [asset, liability, equity, income, expense, bank, cash, receivable, payable, stock, tax]
        parent_id: { type: string, nullable: true }
        is_group: { type: boolean }
        opening_balance: { type: number }
        current_balance: { type: number }
        currency: { type: string }
        is_active: { type: boolean }

    JournalEntry:
      type: object
      properties:
        id: { type: string }
        voucher_no: { type: string }
        voucher_type:
          type: string
          enum: [journal, payment, receipt, contra, credit_note, debit_note]
        posting_date: { type: string, format: date }
        narration: { type: string }
        lines:
          type: array
          items: { $ref: '#/components/schemas/JournalLine' }
        total_debit: { type: number }
        total_credit: { type: number }
        status: { type: string, enum: [draft, submitted, cancelled] }
        created_at: { type: string, format: date-time }

    JournalLine:
      type: object
      required: [account_id]
      properties:
        account_id: { type: string }
        debit: { type: number, default: 0 }
        credit: { type: number, default: 0 }
        reference: { type: string }
        cost_center: { type: string }
        remarks: { type: string }

    LedgerEntry:
      type: object
      properties:
        date: { type: string, format: date }
        voucher_type: { type: string }
        voucher_no: { type: string }
        party: { type: string }
        remarks: { type: string }
        debit: { type: number }
        credit: { type: number }
        balance: { type: number }

    # ── Expense ──
    Expense:
      type: object
      properties:
        id: { type: string }
        expense_no: { type: string }
        expense_date: { type: string, format: date }
        category_id: { type: string }
        category_name: { type: string }
        party_id: { type: string, nullable: true }
        party_name: { type: string }
        amount: { type: number }
        tax_inclusive: { type: boolean, default: false }
        original_invoice_no: { type: string }
        payment_mode: { type: string }
        notes: { type: string }
        status: { type: string, enum: [submitted, cancelled] }
        items:
          type: array
          items: { $ref: '#/components/schemas/ExpenseItem' }
        receipt_url: { type: string }
        created_by: { type: string }
        created_at: { type: string, format: date-time }

    ExpenseItem:
      type: object
      properties:
        id: { type: string }
        description: { type: string }
        amount: { type: number }

    # ── Notification ──
    NotificationRequest:
      type: object
      required: [channel, invoice_id]
      properties:
        channel: { type: string, enum: [whatsapp, sms, email] }
        invoice_id: { type: string }
        recipient_phone: { type: string }
        recipient_email: { type: string }
        message_template: { type: string }
        attach_pdf: { type: boolean, default: true }
        language: { type: string, default: en }

    # ── Weighing Machine ──
    WeighingReading:
      type: object
      properties:
        device_id: { type: string }
        weight_kg: { type: number }
        unit: { type: string, enum: [kg, g, lb] }
        stable: { type: boolean }
        timestamp: { type: string, format: date-time }

    # ── Report ──
    SalesSummaryReport:
      type: object
      properties:
        period_from: { type: string, format: date }
        period_to: { type: string, format: date }
        total_invoices: { type: integer }
        total_sales: { type: number }
        total_returns: { type: number }
        net_sales: { type: number }
        total_discount: { type: number }
        total_tax: { type: number }
        total_cgst: { type: number }
        total_sgst: { type: number }
        total_igst: { type: number }
        cash_collected: { type: number }
        upi_collected: { type: number }
        card_collected: { type: number }
        credit_sales: { type: number }
        top_products:
          type: array
          items:
            type: object
            properties:
              product_id: { type: string }
              product_name: { type: string }
              qty_sold: { type: number }
              total_amount: { type: number }

security:
  - BearerAuth: []

# ─────────────────────────────────────────────
# PATHS
# ─────────────────────────────────────────────
paths:

  # ════════════════════════════════
  # AUTH
  # ════════════════════════════════
  /auth/login:
    post:
      tags: [Auth]
      summary: User login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LoginResponse' }
        '401':
          description: Invalid credentials

