    post:
      tags: [Auth]
      summary: Change current user password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [old_password, new_password]
              properties:
                old_password: { type: string }
                new_password: { type: string }
      responses:
        '200': { description: Password updated }

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Initiate password reset (OTP via SMS/email)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string }
                phone: { type: string }
      responses:
        '200': { description: OTP sent }

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password using OTP
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [otp, new_password]
              properties:
                otp: { type: string }
                new_password: { type: string }
      responses:
        '200': { description: Password reset successful }

