      responses:
        '200': { description: Updated }

  # ════════════════════════════════
  # WEBHOOKS
  # ════════════════════════════════
  /webhooks/subscriptions:
    get:
      tags: [Webhooks]
      summary: List webhook subscriptions
      responses:
        '200':
          description: Subscriptions
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string }
                    url: { type: string }
                    events: { type: array, items: { type: string } }
                    secret: { type: string }
                    is_active: { type: boolean }
    post:
      tags: [Webhooks]
      summary: Create webhook subscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url, events]
              properties:
                url: { type: string }
                events:
                  type: array
                  items:
                    type: string
                    enum:
                      - invoice.created
                      - invoice.paid
                      - invoice.cancelled
                      - payment.received
                      - stock.low
                      - stock.updated
                      - customer.created
                      - purchase.received
                      - session.closed
                secret: { type: string }
      responses:
        '201': { description: Created }

  /webhooks/subscriptions/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    put:
      tags: [Webhooks]
      summary: Update subscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url: { type: string }
                events: { type: array, items: { type: string } }
                is_active: { type: boolean }
      responses:
        '200': { description: Updated }
    delete:
      tags: [Webhooks]
      summary: Delete subscription
      responses:
        '204': { description: Deleted }

  /webhooks/subscriptions/{id}/test:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    post:
