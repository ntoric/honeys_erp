  # ════════════════════════════════
  /gst/summary:
    get:
      tags: [GST]
      summary: Get GST liability summary for a period
      parameters:
        - name: period
          in: query
          required: true
          schema: { type: string, example: "2024-03" }
        - name: outlet_id
          in: query
          schema: { type: string }
      responses:
        '200':
          content: { application/json: { schema: { $ref: '#/components/schemas/GSTRSummary' } } }
          description: OK

  /gst/gstr1:
    get:
      tags: [GST]
      summary: Get GSTR-1 data for filing
      parameters:
        - name: period
          in: query
          required: true
          schema: { type: string, example: "2024-03" }
        - name: format
          in: query
          schema: { type: string, enum: [json, excel], default: json }
      responses:
        '200':
          description: GSTR-1 data
          content:
            application/json:
              schema: { type: object }
            application/octet-stream:
              schema: { type: string, format: binary }

  /gst/gstr3b:
    get:
      tags: [GST]
      summary: Get GSTR-3B summary
      parameters:
        - name: period
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          description: GSTR-3B
          content:
            application/json:
              schema: { type: object }

  /gst/gstr2:
    get:
      tags: [GST]
      summary: Get GSTR-2 (purchases) data
      parameters:
        - name: period
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          description: GSTR-2
          content:
            application/json:
              schema: { type: object }

  /gst/einvoice/generate:
    post:
      tags: [GST]
      summary: Generate e-Invoice (IRN) for invoice
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EInvoiceRequest' }
      responses:
        '200':
          content: { application/json: { schema: { $ref: '#/components/schemas/EInvoiceResponse' } } }
          description: e-Invoice generated

  /gst/einvoice/cancel:
    post:
      tags: [GST]
      summary: Cancel e-Invoice (IRN)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EInvoiceRequest' }
      responses:
        '200':
          content: { application/json: { schema: { $ref: '#/components/schemas/EInvoiceResponse' } } }
          description: Cancelled

  /gst/einvoice/{invoice_id}:
    parameters:
      - name: invoice_id
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [GST]
      summary: Get e-Invoice details for invoice
      responses:
        '200':
          content: { application/json: { schema: { $ref: '#/components/schemas/EInvoiceResponse' } } }
          description: OK

  /gst/ewaybill/generate:
    post:
      tags: [GST]
      summary: Generate e-Way Bill
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EWayBillRequest' }
      responses:
        '200':
          content: { application/json: { schema: { $ref: '#/components/schemas/EWayBillResponse' } } }
          description: e-Way Bill generated

  /gst/ewaybill/cancel:
    post:
      tags: [GST]
      summary: Cancel e-Way Bill
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ewb_no, cancel_reason]
              properties:
                ewb_no: { type: string }
                cancel_reason: { type: string }
      responses:
        '200': { description: Cancelled }

  /gst/ewaybill/{ewb_no}:
    parameters:
      - name: ewb_no
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [GST]
      summary: Get e-Way Bill details
      responses:
        '200':
          content: { application/json: { schema: { $ref: '#/components/schemas/EWayBillResponse' } } }
          description: OK

