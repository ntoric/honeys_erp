  /settings/backup/list:
    get:
      tags: [Settings]
      summary: List available backups
      responses:
        '200':
          description: Backups
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string }
                    created_at: { type: string, format: date-time }
                    size_mb: { type: number }
                    download_url: { type: string }

  /settings/audit-log:
    get:
      tags: [Settings]
      summary: Get system audit log
      parameters:
        - name: user_id
          in: query
          schema: { type: string }
        - name: action
          in: query
          schema: { type: string }
        - name: doc_type
          in: query
          schema: { type: string }
        - name: from_date
          in: query
          schema: { type: string, format: date }
        - name: to_date
          in: query
          schema: { type: string, format: date }
        - name: page
          in: query
          schema: { type: integer }
        - name: per_page
          in: query
          schema: { type: integer }
      responses:
        '200':
          description: Audit entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        user_id: { type: string }
                        user_name: { type: string }
                        action: { type: string, enum: [create, update, delete, submit, cancel, login, logout] }
                        doc_type: { type: string }
                        doc_id: { type: string }
                        changes: { type: object }
                        ip_address: { type: string }
                        timestamp: { type: string, format: date-time }
                  meta: { $ref: '#/components/schemas/PaginationMeta' }
