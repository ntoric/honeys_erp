      summary: Send test event to webhook URL
      responses:
        '200': { description: Test sent }

  /webhooks/logs:
    get:
      tags: [Webhooks]
      summary: Get webhook delivery logs
      parameters:
        - name: subscription_id
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string, enum: [delivered, failed] }
        - name: page
          in: query
          schema: { type: integer }
      responses:
        '200':
          description: Logs
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string }
                    event: { type: string }
                    url: { type: string }
                    status_code: { type: integer }
                    response: { type: string }
                    delivered_at: { type: string, format: date-time }

