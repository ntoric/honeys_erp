      parameters:
        - name: date
          in: query
          required: true
          schema: { type: string, format: date }
        - name: outlet_id
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Day book entries
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/LedgerEntry' }

  /reports/export/{report_type}:
    parameters:
      - name: report_type
        in: path
        required: true
        schema:
          type: string
          enum:
            - sales_summary
            - sales_by_product
            - stock_valuation
            - party_balance
            - gstr1
            - gstr3b
    get:
      tags: [Reports]
      summary: Export any report to CSV/Excel/PDF
      parameters:
        - name: from_date
          in: query
          schema: { type: string, format: date }
        - name: to_date
          in: query
          schema: { type: string, format: date }
        - name: format
          in: query
          schema: { type: string, enum: [csv, xlsx, pdf], default: xlsx }
      responses:
        '200':
          description: File download
          content:
            application/octet-stream:
              schema: { type: string, format: binary }

  # ════════════════════════════════
  # NOTIFICATIONS
  # ════════════════════════════════
  /notifications/send:
    post:
      tags: [Notifications]
      summary: Send invoice / document via WhatsApp / SMS / Email
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NotificationRequest' }
      responses:
        '200':
          description: Sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message_id: { type: string }
                  status: { type: string }

  /notifications/templates:
    get:
      tags: [Notifications]
      summary: List message templates
      responses:
        '200':
          description: Templates
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string }
                    name: { type: string }
                    channel: { type: string }
                    language: { type: string }
                    body: { type: string }
    post:
      tags: [Notifications]
      summary: Create message template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                channel: { type: string, enum: [whatsapp, sms, email] }
                language: { type: string }
                body: { type: string }
                subject: { type: string, description: For email only }
      responses:
        '201': { description: Created }

  /notifications/templates/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    put:
      tags: [Notifications]
      summary: Update template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                body: { type: string }
                subject: { type: string }
      responses:
        '200': { description: Updated }
    delete:
      tags: [Notifications]
      summary: Delete template
      responses:
        '204': { description: Deleted }

  /notifications/logs:
    get:
      tags: [Notifications]
      summary: Get notification delivery logs
      parameters:
        - name: channel
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string, enum: [sent, failed, pending] }
        - name: from_date
          in: query
          schema: { type: string, format: date }
        - name: to_date
          in: query
          schema: { type: string, format: date }
        - name: page
          in: query
          schema: { type: integer }
        - name: per_page
          in: query
          schema: { type: integer }
      responses:
        '200':
          description: Notification logs
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string }
                    channel: { type: string }
                    recipient: { type: string }
                    message: { type: string }
                    status: { type: string }
                    error: { type: string }
                    sent_at: { type: string, format: date-time }

  /notifications/payment-reminder:
    post:
      tags: [Notifications]
      summary: Send payment reminders to overdue customers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                overdue_days: { type: integer, description: Send to customers overdue by N days }
                channel: { type: string, enum: [whatsapp, sms, email] }
                template_id: { type: string }
      responses:
        '200':
          description: Reminders sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  sent_count: { type: integer }
                  failed_count: { type: integer }

  # ════════════════════════════════
