      parameters:
        - name: from_date
          in: query
          required: true
          schema: { type: string, format: date }
        - name: to_date
          in: query
          required: true
          schema: { type: string, format: date }
      responses:
        '200':
          description: Discount summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_discount: { type: number }
                  discount_by_cashier:
                    type: array
                    items:
                      type: object
                      properties:
                        cashier_name: { type: string }
                        total_discount: { type: number }

  /reports/day-book:
    get:
      tags: [Reports]
