  # ════════════════════════════════
  # PAYMENT GATEWAY
  # ════════════════════════════════
  /payment-gateway/initiate:
    post:
      tags: [PaymentGateway]
      summary: Initiate online payment (UPI / card / net banking)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [invoice_id, amount, mode]
              properties:
                invoice_id: { type: string }
                amount: { type: number }
                mode: { type: string, enum: [upi, card, netbanking, wallet] }
                upi_id: { type: string }
                customer_phone: { type: string }
                redirect_url: { type: string }
      responses:
        '200':
          description: Payment initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  transaction_id: { type: string }
                  payment_url: { type: string }
                  qr_code_base64: { type: string, description: UPI QR code }
                  status: { type: string, enum: [pending, initiated] }

  /payment-gateway/status/{transaction_id}:
    parameters:
      - name: transaction_id
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [PaymentGateway]
      summary: Get payment transaction status
      responses:
        '200':
          description: Transaction status
          content:
            application/json:
              schema:
                type: object
                properties:
                  transaction_id: { type: string }
                  status: { type: string, enum: [pending, success, failed, refunded] }
                  amount: { type: number }
                  gateway_ref: { type: string }
                  paid_at: { type: string, format: date-time }

  /payment-gateway/refund:
    post:
      tags: [PaymentGateway]
      summary: Initiate payment refund
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [transaction_id, amount]
              properties:
                transaction_id: { type: string }
                amount: { type: number }
                reason: { type: string }
      responses:
        '200':
          description: Refund initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  refund_id: { type: string }
                  status: { type: string }

  /payment-gateway/webhook:
    post:
      tags: [PaymentGateway]
      summary: Payment gateway webhook callback (public)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '200': { description: Acknowledged }

  /payment-gateway/config:
    get:
      tags: [PaymentGateway]
      summary: Get gateway configuration
      responses:
        '200':
          description: Config
          content:
            application/json:
              schema:
                type: object
                properties:
